name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.14 is the supported minimum; latest stable exercises the most recent OTP.
        elixir: ['1.14', '1.18']
        otp: ['25', '27']
        exclude:
          # Elixir 1.14 does not run on OTP 27.
          - elixir: '1.14'
            otp: '27'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and _build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-elixir-${{ matrix.elixir }}-otp-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-${{ matrix.elixir }}-otp-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatted
        run: mix format --check-formatted

      - name: Credo (lint)
        run: mix credo --strict

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run unit tests (offline-safe)
        run: mix test

  live:
    # The layer that catches client/server contract drift. Downloads a
    # mongreldb-server binary, starts it, and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Cache deps and _build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-elixir-live-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-live-

      - name: Install dependencies
        run: mix deps.get

      - name: Cache mongreldb-server binary
        uses: actions/cache@v6
        id: server-cache
        with:
          path: /tmp/mongreldb-server
          key: mongreldb-server-${{ runner.os }}-0.60.2

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/mongreldb-server \
            https://github.com/visorcraft/MongrelDB/releases/download/v0.60.2/mongreldb-server-linux-x64
          chmod +x /tmp/mongreldb-server

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          /tmp/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: mix test --include skip_without_server

      - name: Run examples
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: |
          for ex in examples/*.exs; do
            echo "=== Running $ex ==="
            mix run "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
